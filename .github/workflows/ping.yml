name: Keep HF Space Awake
on:
  schedule:
    # Runs every 6 hours (UTC)
    - cron: '0 */6 * * *'
  # Allows you to run it manually from the "Actions" tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space
        run: curl -I https://dzdozy-flow-lite.hf.space/health
